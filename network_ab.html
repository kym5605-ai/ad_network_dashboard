function b64(s){const bin=atob(s),u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
const SALT=b64(SALT_B64),IV=b64(IV_B64),DATA=b64(DATA_B64);
async function dk(pw){const bk=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt:SALT,iterations:ITER,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function td(pw){const k=await dk(pw);const buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:IV},k,DATA);return new TextDecoder().decode(buf);}
function render(html){const f=document.createElement("iframe");f.style.cssText="position:fixed;inset:0;width:100vw;height:100vh;border:0;margin:0";f.srcdoc=html;document.body.innerHTML="";document.body.appendChild(f);document.documentElement.style.overflow="hidden";}
function save(pw){try{localStorage.setItem(RK,JSON.stringify({pw,exp:Date.now()+DAYS*864e5}));}catch(e){}}
function get(){try{const o=JSON.parse(localStorage.getItem(RK));if(o&&o.exp>Date.now())return o.pw;}catch(e){}return null;}
async function submit(){const el=document.getElementById("pw"),err=document.getElementById("err"),btn=document.getElementById("go");const pw=el.value;if(!pw)return;btn.disabled=true;btn.textContent="확인 중...";err.style.display="none";try{const h=await td(pw);save(pw);render(h);}catch(e){err.style.display="block";btn.disabled=false;btn.textContent="입장";el.select();}}
window.addEventListener("DOMContentLoaded",async function(){const s=get();if(s){try{render(await td(s));return;}catch(e){localStorage.removeItem(RK);}}document.getElementById("gate").style.display="flex";const el=document.getElementById("pw");el.focus();document.getElementById("go").addEventListener("click",submit);el.addEventListener("keydown",e=>{if(e.key==="Enter")submit();});});</script></body></html>
